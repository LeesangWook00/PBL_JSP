<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1, user-scalable=0">
<meta charset="utf-8">
<link rel="stylesheet" href="../css/core.css">
<title>MySNS</title>
</head>
<body>
<form action="../jsp/signup.jsp" method="post">
<div class="page-hdr">MySNS</div>
<div class="page-body">
    <div class="menu-bar">
        <a href="../index.jsp">홈</a>
        <a href="../jsp/main.jsp">피드</a>
        <a href="login.html">로그인</a>
        <a href="signup.html">회원가입</a>
    </div>
    <div class="section">
        <h2>회원가입</h2>
        <input name="id" type="text" placeholder="아이디 (이메일주소)" required>
        <input name="ps" type="password" class="mtop-10" placeholder="패스워드" required>
        <input name="ps2" type="password" class="mtop-10" placeholder="패스워드 (확인)" required>
        <input name="name" type="text" class="mtop-10" placeholder="이름" required>
        <textarea name="bio" class="mtop-10" placeholder="소개"></textarea>
        <input type="submit" class="mtop-20" value="회원가입하기"> 
    </div>
    <div class="section mtop-30">
        <div class="desc mbot-20">
	회원 가입시 MySNS의 약관에 동의하신 것으로 간주합니다.
       </div>
       <div class="button">약관보기</div>
       </div>
</div>
<div class="page-footer">Copyright: mysns.com, 202x</div>
</form>
</body>
</html>
